<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MFG5 ระบบสแกนบัตร - ออกนอกพื้นที่</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2>🚻 ระบบบันทึกการออกนอกพื้นที่ / เข้าห้องน้ำ</h2>
            <button onclick="location.href='index.html'" class="btn-secondary">⬅️ กลับหน้าหลัก</button>
        </div>

        <div class="shift-container" style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px;">
            <button class="shift-btn active" onclick="selectReason('เข้าห้องน้ำ', 15, this)" style="flex: 1; padding: 12px; font-size: 16px; cursor: pointer;">🚻 เข้าห้องน้ำ (15 นาที)</button>
            <button class="shift-btn" onclick="selectReason('ดื่มน้ำ/พักผ่อน', 10, this)" style="flex: 1; padding: 12px; font-size: 16px; cursor: pointer;">☕ ดื่มน้ำ/พักผ่อน (10 นาที)</button>
            <button class="shift-btn" onclick="selectReason('พบหัวหน้างาน/ซ่อมบำรุง', 0, this)" style="flex: 1; padding: 12px; font-size: 16px; cursor: pointer;">🛠️ พบช่าง/อื่นๆ (ไม่จำกัด)</button>
        </div>

        <div class="scan-box">
            <h3>สแกนรหัสพนักงานเพื่อออก / กลับเข้าพื้นที่</h3>
            <input type="text" id="employeeRestroom" placeholder="ยิง Barcode หรือพิมพ์รหัสพนักงานแล้วกด Enter" autocomplete="off" autofocus onkeydown="handleRestroomScan(event)" style="width: 70%; padding: 12px; font-size: 16px; margin-top: 10px;">
            <div id="restroomMessage" class="message-box">เลือกสาเหตุ: เข้าห้องน้ำ (จำกัดเวลา 15 นาที)</div>
        </div>

        <div class="action-bar">
            <button onclick="exportRestroomExcel()" class="btn-excel">📊 ส่งออกรายงาน (CSV)</button>
        </div>

        <div class="table-container" style="margin-top: 20px;">
            <table>
                <thead>
                    <tr>
                        <th>รหัสพนักงาน</th>
                        <th>แผนก</th>
                        <th>สาเหตุ</th>
                        <th>เวลาเริ่มออก</th>
                        <th>เวลากลับเข้า</th>
                        <th>เวลารวม</th>
                        <th>สถานะ / จับเวลา</th>
                        <th>จัดการ</th>
                    </tr>
                </thead>
                <tbody id="restroomList">
                    <tr><td colspan="8" style="text-align: center; color: #94a3b8; padding: 30px;">ไม่พบข้อมูลการออกนอกพื้นที่</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
