<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MFG5 ระบบสแกนบัตร - รายงานสรุป</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2>📄 รายงานสรุปข้อมูลการลงเวลาพนักงาน</h2>
            <button onclick="location.href='index.html'" class="btn-secondary">⬅️ กลับหน้าหลัก</button>
        </div>

        <div class="dashboard-grid">
            <div class="card"><p>พนักงานทั้งหมด</p><h3 id="sumTotal">0</h3></div>
            <div class="card"><p>เข้างานแล้ว</p><h3 id="sumIn">0</h3></div>
            <div class="card"><p>มาสาย</p><h3 id="sumLate">0</h3></div>
            <div class="card"><p>ทำ OT</p><h3 id="sumOT">0</h3></div>
        </div>

        <div class="action-bar" style="margin-top: 20px;">
            <button onclick="exportSummary()" class="btn-excel">📊 ส่งออกรายงาน (CSV)</button>
        </div>

        <div class="table-container" style="margin-top: 20px;">
            <table>
                <thead>
                    <tr>
                        <th>รหัสพนักงาน</th>
                        <th>🟢 วันที่ / เวลาเข้า</th>
                        <th>🔴 วันที่ / เวลาออก</th>
                        <th>กะ</th>
                        <th>สถานะ</th>
                        <th>OT</th>
                    </tr>
                </thead>
                <tbody id="summaryList">
                    <tr><td colspan="6" style="text-align: center; color: #94a3b8; padding: 30px;">ไม่พบข้อมูล</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // โหลดข้อมูลและแสดงผลสรุปทันทีเมื่อหน้าเว็บเปิดขึ้นมา
        document.addEventListener("DOMContentLoaded", () => {
            loadDashboard();
            showSummary();
        });
    </script>
</body>
</html>
