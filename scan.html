<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MFG5 ระบบสแกนบัตร - หน้าสแกนลงเวลา</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div style="display: flex; justify-content: flex-end; margin-bottom: 10px;">
            <button onclick="location.href='index.html'" class="btn-secondary">⬅️ กลับหน้าหลัก</button>
        </div>

        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; background: #0f172a; padding: 18px 20px; border-radius: 12px; margin-bottom: 20px; color: #ffffff;">
            <div style="font-size: 18px; font-weight: 700; letter-spacing: 1px;">🎫 MFG5 ระบบสแกนบัตร</div>
            <div style="font-size: 15px; color: #94a3b8; font-weight: 600;">📅 <span id="date">กำลังโหลดวันที่...</span></div>
            <div style="font-size: 44px; font-weight: 700; letter-spacing: 2px; color: #38bdf8;">⏰ <span id="time">กำลังโหลดเวลา...</span></div>
        </div>

        <div class="shift-container">
            <button class="shift-btn active" onclick="setShift('กะเช้า', this)">☀️ กะเช้า (08:00)</button>
            <button class="shift-btn" onclick="setShift('กะดึก', this)">🌙 กะดึก (20:00)</button>
        </div>

        <div class="scan-box">
            <h2>ยิงบาร์โค้ด / พิมพ์รหัสพนักงาน</h2>
            <input type="text" id="employee" placeholder="ยิง Barcode หรือพิมพ์รหัสแล้วกด Enter" autocomplete="off" autofocus onkeydown="handleScan(event)">
            <div id="message" class="message-box">พร้อมสแกน [กะเช้า]</div>
        </div>

        <div class="dashboard-grid">
            <div class="card"><p>สแกนวันนี้</p><h3 id="total">0</h3></div>
            <div class="card"><p>เข้างานแล้ว</p><h3 id="checkin">0</h3></div>
            <div class="card"><p>ออกงานแล้ว</p><h3 id="checkout">0</h3></div>
            <div class="card"><p>ทำ OT</p><h3 id="ot">0</h3></div>
        </div>

        <div class="action-bar">
            <input type="text" id="search" placeholder="ค้นหารหัสพนักงาน..." onkeyup="renderTable()">
            <button onclick="exportExcel()" class="btn-excel">📊 Excel</button>
            <input type="file" id="importFile" accept=".csv,.xlsx,.xls" style="display:none" onchange="importExcel(event)">
            <button onclick="document.getElementById('importFile').click()" class="btn-import">📥 นำเข้าข้อมูล</button>
            <button onclick="window.location.href='summary.html'" class="btn-summary">📋 รายงาน</button>
            <button onclick="window.location.href='restroom.html'" class="btn-restroom">🚻 ออกนอกพื้นที่</button>
            <button onclick="window.location.href='display.html'" class="btn-display">📺 จอแสดงผล</button>
            <button onclick="window.location.href='employees.html'" class="btn-secondary">👥 จัดการพนักงาน</button>
            <button onclick="clearData()" class="btn-danger">🗑️ ล้างข้อมูล</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>รหัสพนักงาน</th>
                        <th>แผนก</th>
                        <th>🟢 วันที่ / เวลาเข้า</th>
                        <th>🔴 วันที่ / เวลาออก</th>
                        <th>กะ</th>
                        <th>สถานะ</th>
                        <th>OT</th>
                        <th>จัดการ</th>
                    </tr>
                </thead>
                <tbody id="list">
                    <tr><td colspan="8" style="text-align: center; color: #94a3b8; padding: 30px;">ไม่พบข้อมูลการสแกน</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="editModal" class="modal" style="display:none;">
        <div class="modal-content">
            <h3>แก้ไขข้อมูลการลงเวลา</h3>
            <input type="hidden" id="editId">
            <label>รหัสพนักงาน:</label><input type="text" id="editEmpCode">
            <label>เวลาเข้า:</label><input type="text" id="editCheckIn">
            <label>เวลาออก:</label><input type="text" id="editCheckOut">
            <label>กะ:</label><input type="text" id="editShift">

            <!-- ปรับแก้ตรงนี้ให้เป็น Dropdown เลือก ปกติ / สาย -->
            <label>สถานะ:</label>
            <select id="editStatus">
                <option value="ปกติ">ปกติ</option>
                <option value="สาย">สาย</option>
            </select>

            <label>OT:</label>
            <select id="editOt">
                <option value="ทำ">ทำ</option>
                <option value="ไม่ทำ">ไม่ทำ</option>
            </select>
            <div style="display: flex; justify-content: space-between; margin-top: 20px;">
                <button onclick="deleteRecordFromModal()" class="btn-danger">🗑️ ลบรายการนี้</button>
                <div>
                    <button onclick="closeEditModal()" class="btn-secondary">ยกเลิก</button>
                    <button onclick="saveEdit()" class="btn-success">บันทึก</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
