<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MFG5 ระบบสแกนบัตร - จอแสดงผล</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #0f172a; color: #f8fafc; }
        .container { max-width: 1400px; background: #0f172a; border: none; box-shadow: none; }
        .display-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #334155; padding-bottom: 15px; margin-bottom: 20px; }
        .latest-card { background: #1e293b; border: 2px solid #475569; border-radius: 12px; padding: 25px; text-align: center; margin-bottom: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); transition: all 0.3s ease; }
        .latest-card h1 { font-size: 60px; margin: 10px 0; color: #38bdf8; }
        .active-checkin { border-color: #22c55e; background: #064e3b; }
        .active-checkout { border-color: #ef4444; background: #7f1d1d; }
        
        .table-container { background: #1e293b; border: 1px solid #334155; }
        .table-container table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 8px; overflow: hidden; }
        .table-container th, .table-container td { padding: 15px; text-align: center; border-bottom: 1px solid #334155; color: #cbd5e1; }
        .table-container th { background: #334155; color: #e2e8f0; font-size: 18px; }
        .table-container tr:hover { background: #273548; }

        .search-box { width: 100%; padding: 12px; font-size: 16px; border-radius: 8px; border: 1px solid #475569; background: #1e293b; color: white; margin-bottom: 20px; outline: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="display-header">
            <h2>📺 MFG5 ระบบสแกนบัตร - จอแสดงผล (Real-time)</h2>
            <div id="clock" style="font-size: 24px; font-weight: bold; color: #38bdf8;">00:00:00</div>
        </div>

        <div id="latestCard" class="latest-card">
            <h3 id="scanActionTitle" style="font-size: 24px; color: #cbd5e1;">รอการสแกน...</h3>
            <h1 id="latestEmpCode">-----</h1>
            <p id="latestDetails" style="font-size: 20px; color: #94a3b8;">กรุณาสแกนบัตรพนักงานที่เครื่องสแกน</p>
        </div>

        <input type="text" id="empSearchInput" class="search-box" placeholder="🔍 ค้นหารหัสพนักงานวันนี้..." onkeyup="renderDisplayTable()">

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>รหัสพนักงาน</th>
                        <th>🟢 เวลาเข้างาน</th>
                        <th>🔴 เวลาออกงาน</th>
                        <th>กะ</th>
                        <th>สถานะ</th>
                        <th>OT</th>
                    </tr>
                </thead>
                <tbody id="displayList">
                    <tr><td colspan="6" style="text-align: center; color: #94a3b8; padding: 30px;">ไม่พบข้อมูลการลงเวลา</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        setInterval(() => {
            let now = new Date();
            let clockEl = document.getElementById('clock');
            if(clockEl) clockEl.innerText = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
        }, 1000);
    </script>
</body>
</html>
